services:
  directus-safe-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: directus-safe-mcp
    restart: unless-stopped
    environment:
      DIRECTUS_URL: ${DIRECTUS_URL}
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN}

      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3333}
      MCP_BIND_HOST: ${MCP_BIND_HOST:-0.0.0.0}
      MCP_ENDPOINT_PATH: ${MCP_ENDPOINT_PATH:-/mcp}

      MCP_REQUIRE_AUTH: ${MCP_REQUIRE_AUTH:-true}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}

      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-}

      DIRECTUS_ALLOWED_COLLECTIONS: ${DIRECTUS_ALLOWED_COLLECTIONS:-}
      DIRECTUS_DENIED_COLLECTION_PREFIXES: ${DIRECTUS_DENIED_COLLECTION_PREFIXES:-directus_}
      DIRECTUS_ALLOW_DELETE: ${DIRECTUS_ALLOW_DELETE:-false}
      DIRECTUS_ALLOW_SCHEMA_WRITE: ${DIRECTUS_ALLOW_SCHEMA_WRITE:-false}

      MUTATION_DRY_RUN_DEFAULT: ${MUTATION_DRY_RUN_DEFAULT:-true}
      MUTATION_REQUIRE_VERIFY: ${MUTATION_REQUIRE_VERIFY:-true}
      MUTATION_MAX_BATCH_SIZE: ${MUTATION_MAX_BATCH_SIZE:-100}

      READ_DEFAULT_LIMIT: ${READ_DEFAULT_LIMIT:-50}
      READ_MAX_LIMIT: ${READ_MAX_LIMIT:-500}
      ALLOW_WILDCARD_FIELDS: ${ALLOW_WILDCARD_FIELDS:-false}

      SCHEMA_CACHE_TTL_SECONDS: ${SCHEMA_CACHE_TTL_SECONDS:-300}
      VERIFY_CASE_INSENSITIVE: ${VERIFY_CASE_INSENSITIVE:-false}

      SCHEMA_TEXT_MAX_FIELDS: ${SCHEMA_TEXT_MAX_FIELDS:-80}
      READ_TEXT_MAX_ROWS: ${READ_TEXT_MAX_ROWS:-10}
      READ_TEXT_MAX_CHARS: ${READ_TEXT_MAX_CHARS:-12000}

      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3333:3333"
